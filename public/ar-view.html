<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>remnant log AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

    /* シーンは常に全画面 */
    a-scene { width:100vw; height:100vh; }

    /* ローディングオーバーレイ */
    #overlay {
      position:fixed; inset:0; z-index:900;
      background:#0a0908;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
      transition:opacity 0.6s ease;
    }
    #overlay.hidden { opacity:0; pointer-events:none; }
    #ov-dot { width:8px; height:8px; border-radius:50%; background:#c8b88a; animation:pulse 1.5s ease infinite; }
    #ov-msg { font-size:11px; color:#3a3832; letter-spacing:0.15em; text-align:center; line-height:2.2; padding:0 32px; }
    #ov-err { font-size:11px; color:#8a5a5a; letter-spacing:0.1em; text-align:center; padding:16px 32px; line-height:2; display:none; }
    #ov-retry { display:none; margin-top:8px; font-size:10px; color:#c8b88a; background:none; border:1px solid #2e2a1e; padding:8px 20px; border-radius:3px; cursor:pointer; letter-spacing:0.1em; }

    /* メッセージパネル */
    #msg-panel {
      position:fixed; bottom:0; left:0; right:0; z-index:800;
      background:#0e0c0a; border-top:1px solid #2a2620;
      padding:20px 22px 36px;
      transform:translateY(100%);
      transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    #msg-panel.open { transform:translateY(0); }
    #msg-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    #msg-uid { font-size:10px; color:#c8b88a; letter-spacing:0.1em; }
    #msg-ts  { font-size:9px;  color:#3a3832; }
    #msg-div { height:1px; background:linear-gradient(90deg,transparent,#2a2620,transparent); margin-bottom:14px; }
    #msg-body { font-size:14px; line-height:1.95; color:#d8d4cc; margin-bottom:14px; }
    #msg-foot { display:flex; justify-content:space-between; align-items:center; }
    #msg-exp  { font-size:9px; color:#3a3832; letter-spacing:0.08em; }
    #msg-close { font-size:10px; color:#c8b88a; background:none; border:1px solid #2e2a1e; padding:5px 14px; border-radius:3px; cursor:pointer; letter-spacing:0.08em; }

    /* 閉じるボタン */
    #back-btn {
      position:fixed; top:20px; left:20px; z-index:700;
      background:rgba(10,9,8,0.85); border:1px solid #2a2620;
      color:#888; font-size:12px; padding:8px 14px;
      border-radius:20px; cursor:pointer; letter-spacing:0.08em;
    }

    /* ヒント */
    #hint {
      position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
      z-index:600; font-size:10px; color:#3a3832; letter-spacing:0.12em;
      background:rgba(10,9,8,0.75); padding:6px 16px;
      border-radius:20px; border:1px solid #1a1816;
      white-space:nowrap;
    }
    #hint.hidden { display:none; }

    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(1.5);} }
  </style>
</head>
<body>

  <!-- ローディングオーバーレイ（シーンの上に被せる） -->
  <div id="overlay">
    <div id="ov-dot"></div>
    <div id="ov-msg">カメラと位置情報を起動しています<br>許可ダイアログが表示されたら「許可」を選んでください</div>
    <div id="ov-err"></div>
    <button id="ov-retry" onclick="start()">もう一度試す</button>
  </div>

  <!-- メッセージパネル -->
  <div id="msg-panel">
    <div id="msg-top">
      <span id="msg-uid"></span>
      <span id="msg-ts"></span>
    </div>
    <div id="msg-div"></div>
    <div id="msg-body"></div>
    <div id="msg-foot">
      <span id="msg-exp"></span>
      <button id="msg-close" onclick="closeMsg()">閉じる</button>
    </div>
  </div>

  <!-- 戻るボタン -->
  <button id="back-btn" onclick="history.back()">← 戻る</button>

  <!-- ヒント -->
  <div id="hint">痕跡のマーカーをタップしてください</div>

  <!-- A-Frameシーン（常にDOMに存在） -->
  <a-scene
    id="scene"
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
    embedded
  >
    <a-camera
      id="camera"
      gps-projected-camera
      rotation-reader
      cursor="rayOrigin: mouse; fuse: false;"
      raycaster="objects: .clickable; far: 10000;"
    ></a-camera>
  </a-scene>

  <script>
    const remnants = JSON.parse(sessionStorage.getItem('remnant_nearby') || '[]');
    const ownUID   = sessionStorage.getItem('remnant_own_uid') || '';

    function showMsg(r) {
      document.getElementById('msg-uid').textContent  = r.uid || '';
      document.getElementById('msg-ts').textContent   = r.timestamp || '';
      document.getElementById('msg-body').textContent = r.text || '';
      document.getElementById('msg-exp').textContent  =
        r.expires === 'forever' ? '永遠に残る' : '1週間で消える';
      document.getElementById('msg-panel').classList.add('open');
      document.getElementById('hint').classList.add('hidden');
    }

    function closeMsg() {
      document.getElementById('msg-panel').classList.remove('open');
      document.getElementById('hint').classList.remove('hidden');
    }

    // Canvas でグローマーカーを生成（日本語テキスト不要）
    function makeMarker(isOwn) {
      const c   = document.createElement('canvas');
      c.width   = 128;
      c.height  = 128;
      const ctx = c.getContext('2d');
      const col = isOwn ? '138,184,200' : '200,184,138';
      // グロー
      const g = ctx.createRadialGradient(64,64,8,64,64,56);
      g.addColorStop(0,   `rgba(${col},0.95)`);
      g.addColorStop(0.4, `rgba(${col},0.5)`);
      g.addColorStop(1,   `rgba(${col},0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(64,64,56,0,Math.PI*2); ctx.fill();
      // コア
      ctx.fillStyle = `rgba(${col},1)`;
      ctx.beginPath(); ctx.arc(64,64,10,0,Math.PI*2); ctx.fill();
      return c;
    }

    // エンティティを追加
    function addMarkers() {
      const scene = document.getElementById('scene');
      remnants.forEach(r => {
        if (r.lat == null || r.lng == null) return;
        const isOwn = r.uid === ownUID;
        const tex   = new THREE.CanvasTexture(makeMarker(isOwn));

        const entity = document.createElement('a-entity');
        entity.setAttribute('gps-projected-entity-place',
          `latitude: ${r.lat}; longitude: ${r.lng}`);

        const plane = document.createElement('a-plane');
        plane.setAttribute('width',    '1.5');
        plane.setAttribute('height',   '1.5');
        plane.setAttribute('position', '0 1.5 0');
        plane.setAttribute('look-at',  '[gps-projected-camera]');
        plane.setAttribute('class',    'clickable');
        plane.setAttribute('material',
          'transparent: true; opacity: 1; side: double; depthTest: false;');

        plane.addEventListener('click', () => showMsg(r));

        plane.addEventListener('loaded', () => {
          const mesh = plane.getObject3D('mesh');
          if (mesh) {
            mesh.material.map         = tex;
            mesh.material.transparent = true;
            mesh.material.needsUpdate = true;
          }
        });

        entity.appendChild(plane);
        scene.appendChild(entity);
      });
    }

    // 権限取得 → マーカー追加 → オーバーレイ除去
    async function start() {
      const errEl   = document.getElementById('ov-err');
      const retryEl = document.getElementById('ov-retry');
      const msgEl   = document.getElementById('ov-msg');
      errEl.style.display   = 'none';
      retryEl.style.display = 'none';

      // カメラ権限
      try {
        msgEl.textContent = 'カメラの許可を求めています...';
        await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      } catch(e) {
        errEl.textContent   = 'カメラの許可が必要です。\nブラウザの設定からカメラを許可してください。';
        errEl.style.display = '';
        retryEl.style.display = '';
        return;
      }

      // 位置情報権限
      try {
        msgEl.textContent = '位置情報の許可を求めています...';
        await new Promise((resolve, reject) =>
          navigator.geolocation.getCurrentPosition(resolve, reject,
            { enableHighAccuracy: true, timeout: 15000 })
        );
      } catch(e) {
        errEl.textContent   = '位置情報の許可が必要です。\nブラウザの設定から位置情報を許可してください。';
        errEl.style.display = '';
        retryEl.style.display = '';
        return;
      }

      // マーカー追加
      msgEl.textContent = '痕跡を配置しています...';
      addMarkers();

      // オーバーレイをフェードアウト
      setTimeout(() => {
        document.getElementById('overlay').classList.add('hidden');
      }, 800);
    }

    start();
  </script>
</body>
</html>
