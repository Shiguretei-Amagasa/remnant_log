<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>remnant log</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

    /* ローディング画面 */
    #loading {
      position:fixed; inset:0; background:#0a0908; z-index:999;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
    }
    #loading-dot { width:8px; height:8px; border-radius:50%; background:#c8b88a; animation:pulse 1.5s ease infinite; }
    #loading-msg { font-size:11px; color:#3a3832; letter-spacing:0.15em; text-align:center; line-height:2; }
    #loading-err { font-size:11px; color:#8a5a5a; letter-spacing:0.1em; text-align:center; padding:0 32px; line-height:2; display:none; }

    /* メッセージオーバーレイ（マーカータップ時） */
    #msg-overlay {
      position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.7);
      display:none; align-items:center; justify-content:center; padding:32px;
    }
    #msg-overlay.active { display:flex; }
    #msg-box {
      background:#0e0c0a; border:1px solid #2a2620; border-radius:6px;
      padding:24px; width:100%; max-width:360px;
      animation:fadeUp 0.3s ease;
    }
    #msg-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    #msg-uid { font-size:10px; color:#c8b88a; letter-spacing:0.1em; }
    #msg-ts { font-size:9px; color:#3a3832; }
    #msg-divider { height:1px; background:linear-gradient(90deg,transparent,#2a2620,transparent); margin-bottom:16px; }
    #msg-text { font-size:14px; line-height:1.95; color:#d8d4cc; margin-bottom:16px; }
    #msg-footer { display:flex; justify-content:space-between; align-items:center; }
    #msg-exp { font-size:9px; color:#3a3832; letter-spacing:0.08em; }
    #msg-close { font-size:10px; color:#c8b88a; background:none; border:1px solid #2e2a1e; padding:4px 12px; border-radius:3px; cursor:pointer; letter-spacing:0.08em; }

    /* 閉じるボタン */
    #close-btn {
      position:fixed; top:20px; right:20px; z-index:400;
      width:40px; height:40px; border-radius:50%;
      background:rgba(10,9,8,0.8); border:1px solid #2a2620;
      color:#666; font-size:14px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }

    /* 距離バッジ */
    #hint {
      position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
      font-size:10px; color:#3a3832; letter-spacing:0.12em;
      background:rgba(10,9,8,0.7); padding:6px 14px; border-radius:20px;
      border:1px solid #1a1816; z-index:300;
    }

    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(1.5);} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
  </style>
</head>
<body>

  <!-- ローディング -->
  <div id="loading">
    <div id="loading-dot"></div>
    <div id="loading-msg">カメラと位置情報を取得しています<br>許可を求めるダイアログが表示されたら「許可」を選んでください</div>
    <div id="loading-err"></div>
  </div>

  <!-- メッセージオーバーレイ -->
  <div id="msg-overlay">
    <div id="msg-box">
      <div id="msg-header">
        <span id="msg-uid"></span>
        <span id="msg-ts"></span>
      </div>
      <div id="msg-divider"></div>
      <div id="msg-text"></div>
      <div id="msg-footer">
        <span id="msg-exp"></span>
        <button id="msg-close" onclick="closeMsg()">閉じる</button>
      </div>
    </div>
  </div>

  <!-- 戻るボタン -->
  <button id="close-btn" onclick="history.back()">✕</button>

  <!-- ヒント -->
  <div id="hint">痕跡に近づいてタップしてください</div>

  <!-- A-Frame シーン（初期は非表示） -->
  <a-scene
    id="ar-scene"
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
    embedded
    style="display:none; width:100%; height:100vh;"
  >
    <a-camera gps-projected-camera rotation-reader></a-camera>
  </a-scene>

  <script>
    // sessionStorageから痕跡データを取得
    const remnants = JSON.parse(sessionStorage.getItem('remnant_nearby') || '[]');

    // マーカーCanvas生成（発光する丸いドット）
    function makeMarkerCanvas(isOwn) {
      const c = document.createElement('canvas');
      c.width = 128; c.height = 128;
      const ctx = c.getContext('2d');
      // 外側グロー
      const grad = ctx.createRadialGradient(64,64,10,64,64,60);
      grad.addColorStop(0, isOwn ? 'rgba(138,184,200,0.9)' : 'rgba(200,184,138,0.9)');
      grad.addColorStop(0.5, isOwn ? 'rgba(138,184,200,0.4)' : 'rgba(200,184,138,0.4)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(64,64,60,0,Math.PI*2);
      ctx.fill();
      // 中心ドット
      ctx.fillStyle = isOwn ? '#8ab8c8' : '#c8b88a';
      ctx.beginPath();
      ctx.arc(64,64,12,0,Math.PI*2);
      ctx.fill();
      return c;
    }

    // メッセージオーバーレイを表示
    function showMsg(r) {
      document.getElementById('msg-uid').textContent  = r.uid;
      document.getElementById('msg-ts').textContent   = r.timestamp;
      document.getElementById('msg-text').textContent = r.text;
      document.getElementById('msg-exp').textContent  = r.expires === 'forever' ? '永遠に残る' : '1週間で消える';
      document.getElementById('msg-overlay').classList.add('active');
    }

    function closeMsg() {
      document.getElementById('msg-overlay').classList.remove('active');
    }

    // ARシーン初期化
    function initScene(userLat, userLng) {
      document.getElementById('loading').style.display = 'none';
      const scene = document.getElementById('ar-scene');
      scene.style.display = '';

      remnants.forEach((r, i) => {
        if (r.lat == null || r.lng == null) return;
        const isOwn = r.uid && r.uid === sessionStorage.getItem('remnant_uid_ref');

        // マーカーテクスチャ
        const canvas  = makeMarkerCanvas(isOwn);
        const texture = new THREE.CanvasTexture(canvas);

        // エンティティ
        const entity = document.createElement('a-entity');
        entity.setAttribute('gps-projected-entity-place', `latitude: ${r.lat}; longitude: ${r.lng}`);

        const plane = document.createElement('a-plane');
        plane.setAttribute('width',  '1.5');
        plane.setAttribute('height', '1.5');
        plane.setAttribute('look-at',  '[gps-projected-camera]');
        plane.setAttribute('position', '0 1.5 0');
        plane.setAttribute('material', 'transparent: true; opacity: 1; side: double;');
        plane.setAttribute('class', 'clickable');

        // クリックでメッセージ表示
        plane.addEventListener('click', () => showMsg(r));

        plane.addEventListener('loaded', () => {
          const mesh = plane.getObject3D('mesh');
          if (mesh) {
            mesh.material.map = texture;
            mesh.material.transparent = true;
            mesh.material.needsUpdate = true;
          }
        });

        entity.appendChild(plane);
        scene.appendChild(entity);
      });

      // クリックシステム有効化
      scene.setAttribute('cursor', 'rayOrigin: mouse');
    }

    // 権限取得 → シーン起動
    async function start() {
      const errEl = document.getElementById('loading-err');

      // 1. カメラ権限
      try {
        await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      } catch(e) {
        errEl.style.display = '';
        errEl.textContent = 'カメラの許可が必要です。ブラウザの設定からカメラを許可してください。';
        return;
      }

      // 2. 位置情報権限
      try {
        await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(
            pos => resolve(pos),
            err => reject(err),
            { enableHighAccuracy: true, timeout: 10000 }
          );
        }).then(pos => {
          initScene(pos.coords.latitude, pos.coords.longitude);
        });
      } catch(e) {
        errEl.style.display = '';
        errEl.textContent = '位置情報の許可が必要です。ブラウザの設定から位置情報を許可してください。';
      }
    }

    start();
  </script>
</body>
</html>
