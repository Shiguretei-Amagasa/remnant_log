<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>remnant log AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
    a-scene { width:100vw; height:100vh; }

    #overlay {
      position:fixed; inset:0; z-index:900; background:#0a0908;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
      transition:opacity 0.8s ease;
    }
    #overlay.hidden { opacity:0; pointer-events:none; }
    #ov-dot { width:8px; height:8px; border-radius:50%; background:#c8b88a; animation:pulse 1.5s ease infinite; }
    #ov-msg { font-size:11px; color:#3a3832; letter-spacing:0.15em; text-align:center; line-height:2.2; padding:0 32px; }

    #msg-panel {
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%, -40%) scale(0.95);
      width:88%; max-width:380px;
      z-index:800;
      background:#0e0c0a;
      border:1px solid #2a2620;
      border-radius:8px;
      padding:22px 22px 24px;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.25s ease, transform 0.25s cubic-bezier(0.16,1,0.3,1);
    }
    #msg-panel.open {
      opacity:1;
      pointer-events:all;
      transform:translate(-50%, -40%) scale(1);
    }
    /* カメラ映像の彩度を落とすオーバーレイ */
    #desat-overlay {
      position:fixed; inset:0; z-index:750;
      background:rgba(0,0,0,0.5);
      backdrop-filter:saturate(0.1) brightness(0.7);
      -webkit-backdrop-filter:saturate(0.1) brightness(0.7);
      opacity:0; pointer-events:none;
      transition:opacity 0.25s ease;
    }
    #desat-overlay.open { opacity:1; }
    #msg-top  { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    #msg-uid  { font-size:10px; color:#c8b88a; letter-spacing:0.1em; }
    #msg-ts   { font-size:9px; color:#3a3832; }
    #msg-div  { height:1px; background:linear-gradient(90deg,transparent,#2a2620,transparent); margin-bottom:14px; }
    #msg-body { font-size:14px; line-height:1.95; color:#d8d4cc; margin-bottom:14px; }
    #msg-foot { display:flex; justify-content:space-between; align-items:center; }
    #msg-exp  { font-size:9px; color:#3a3832; letter-spacing:0.08em; }
    #msg-close { font-size:10px; color:#c8b88a; background:none; border:1px solid #2e2a1e; padding:5px 14px; border-radius:3px; cursor:pointer; }

    #back-btn {
      position:fixed; top:20px; left:20px; z-index:700;
      background:rgba(10,9,8,0.85); border:1px solid #2a2620;
      color:#888; font-size:12px; padding:8px 16px;
      border-radius:20px; cursor:pointer; letter-spacing:0.08em;
    }
    #hint {
      position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
      z-index:600; font-size:10px; color:#3a3832; letter-spacing:0.12em;
      background:rgba(10,9,8,0.75); padding:6px 16px;
      border-radius:20px; border:1px solid #1a1816; white-space:nowrap;
    }
    #hint.hidden { display:none; }

    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(1.5);} }
  </style>
</head>
<body>

  <div id="overlay">
    <div id="ov-dot"></div>
    <div id="ov-msg">起動しています<br>カメラと位置情報の許可ダイアログが表示されたら「許可」を選んでください</div>
  </div>

  <div id="desat-overlay"></div>
  <div id="msg-panel">
    <div id="msg-top">
      <span id="msg-uid"></span>
      <span id="msg-ts"></span>
    </div>
    <div id="msg-div"></div>
    <div id="msg-body"></div>
    <div id="msg-foot">
      <span id="msg-exp"></span>
      <button id="msg-close" onclick="closeMsg()">閉じる</button>
    </div>
  </div>

  <button id="back-btn" onclick="history.back()">← 戻る</button>
  <div id="hint">マーカーをタップするとメッセージが表示されます</div>

  <!--
    AR.jsがカメラと位置情報を内部で管理します。
    手動でgetUserMediaを呼ぶと競合するため呼びません。
  -->
  <a-scene
    id="scene"
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
    embedded
  >
    <a-camera
      gps-projected-camera
      rotation-reader
      cursor="rayOrigin: mouse; fuse: false;"
      raycaster="objects: .clickable; far: 10000;"
    ></a-camera>
  </a-scene>

  <script>
    const remnants = JSON.parse(sessionStorage.getItem('remnant_nearby') || '[]');
    const ownUID   = sessionStorage.getItem('remnant_own_uid') || '';

    function showMsg(r) {
      document.getElementById('msg-uid').textContent  = r.uid || '';
      document.getElementById('msg-ts').textContent   = r.timestamp || '';
      document.getElementById('msg-body').textContent = r.text || '';
      document.getElementById('msg-exp').textContent  =
        r.expires === 'forever' ? '永遠に残る' : '1週間で消える';
      document.getElementById('msg-panel').classList.add('open');
      document.getElementById('desat-overlay').classList.add('open');
      document.getElementById('hint').classList.add('hidden');
    }

    function closeMsg() {
      document.getElementById('msg-panel').classList.remove('open');
      document.getElementById('desat-overlay').classList.remove('open');
      document.getElementById('hint').classList.remove('hidden');
    }

    function seededRand(seed) {
      let s = seed;
      return () => {
        s = (s * 1103515245 + 12345) & 0x7fffffff;
        return s / 0x7fffffff;
      };
    }

    function makeMarker(isOwn) {
      const W = 512, H = 512; // 長さを半分に
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');

      const rgb    = isOwn ? [109, 84, 152] : [90, 255, 25];
      const colStr = rgb.join(',');

      // ユーザー指定パラメータ
      const GAP       = 8;
      const ROUGH     = 120;
      const BRANCHES  = 8;
      const GLOW      = 9;
      const GLOW_A    = 0.22;
      const VOID_DARK = 1.00;
      const EDGE_A    = 0.21;
      const SEED      = 999;

      const rand = seededRand(SEED + (isOwn ? 500 : 0));

      function displace(pts, roughness, depth) {
        if (depth === 0) return pts;
        const result = [pts[0]];
        for (let i = 0; i < pts.length - 1; i++) {
          const [x1,y1] = pts[i], [x2,y2] = pts[i+1];
          const mx = (x1+x2)/2 + (rand()-0.5)*roughness;
          const my = (y1+y2)/2 + (rand()-0.5)*roughness*0.12;
          result.push([mx,my], pts[i+1]);
        }
        return displace(result, roughness*0.6, depth-1);
      }

      const spine = displace(
        [[W/2,16],[W/2-15,H*0.28],[W/2+12,H*0.52],[W/2-8,H*0.74],[W/2+4,H-16]],
        ROUGH, 5
      );

      function buildEdge(pts, side) {
        return pts.map((p,i) => {
          const nx = pts[Math.min(i+1,pts.length-1)];
          const pv = pts[Math.max(i-1,0)];
          const dx = nx[0]-pv[0], dy = nx[1]-pv[1];
          const len = Math.sqrt(dx*dx+dy*dy)||1;
          const nx2=-dy/len, ny2=dx/len;
          const jit = (rand()-0.5)*8;
          return [p[0]+nx2*(GAP/2+jit)*side, p[1]+ny2*(GAP/2+jit)*side];
        });
      }

      const LE = buildEdge(spine,-1);
      const RE = buildEdge(spine, 1);

      function paintGlow(edge, outDir, glowW, alpha) {
        for (let i = 0; i < edge.length-1; i++) {
          const [x1,y1]=edge[i],[x2,y2]=edge[i+1];
          const dx=x2-x1,dy=y2-y1;
          const len=Math.sqrt(dx*dx+dy*dy); if(len<0.1) continue;
          const nx=-dy/len*outDir, ny=dx/len*outDir;
          try {
            const gr = ctx.createLinearGradient(x1,y1,x1+nx*glowW,y1+ny*glowW);
            gr.addColorStop(0,`rgba(${colStr},${alpha})`);
            gr.addColorStop(1,`rgba(${colStr},0)`);
            ctx.fillStyle=gr;
            ctx.beginPath();
            ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
            ctx.lineTo(x2+nx*glowW,y2+ny*glowW);
            ctx.lineTo(x1+nx*glowW,y1+ny*glowW);
            ctx.fill();
          } catch(e){}
        }
      }

      paintGlow(LE,-1,GLOW*1.6,GLOW_A*0.5);
      paintGlow(RE, 1,GLOW*1.6,GLOW_A*0.5);
      paintGlow(LE,-1,GLOW,    GLOW_A*0.8);
      paintGlow(RE, 1,GLOW,    GLOW_A*0.8);
      paintGlow(LE,-1,GLOW*0.4,GLOW_A);
      paintGlow(RE, 1,GLOW*0.4,GLOW_A);

      function fillVoid(l,r,alpha) {
        ctx.beginPath();
        ctx.moveTo(l[0][0],l[0][1]);
        l.forEach(p=>ctx.lineTo(p[0],p[1]));
        [...r].reverse().forEach(p=>ctx.lineTo(p[0],p[1]));
        ctx.closePath();
        ctx.fillStyle=`rgba(0,0,0,${alpha})`;
        ctx.fill();
      }
      fillVoid(LE,RE,VOID_DARK);

      function strokeEdge(edge,w,alpha) {
        ctx.beginPath();
        edge.forEach((p,i)=>i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]));
        ctx.strokeStyle=`rgba(${colStr},${alpha})`;
        ctx.lineWidth=w;
        ctx.lineJoin='round'; ctx.lineCap='round';
        ctx.stroke();
      }
      strokeEdge(LE,4,EDGE_A*0.6);
      strokeEdge(RE,4,EDGE_A*0.6);
      strokeEdge(LE,1.5,EDGE_A);
      strokeEdge(RE,1.5,EDGE_A);

      for (let b = 0; b < BRANCHES; b++) {
        const t   = 0.1+(b/BRANCHES)*0.8;
        const idx = Math.floor(t*spine.length);
        const [bx,by] = spine[idx];
        const side = b%2===0?-1:1;
        const bLen = 35+rand()*40;
        const ang  = (Math.PI/4+rand()*Math.PI/5)*side;

        const bSpine = displace(
          [[bx,by],[bx+Math.cos(ang)*bLen*0.6,by+bLen*0.35],[bx+Math.cos(ang)*bLen,by+bLen*0.6]],
          15,3
        );
        const bLE = buildEdge(bSpine,-1).map((p,i)=>[p[0]*0.5+bSpine[i][0]*0.5,p[1]*0.5+bSpine[i][1]*0.5]);
        const bRE = buildEdge(bSpine, 1).map((p,i)=>[p[0]*0.5+bSpine[i][0]*0.5,p[1]*0.5+bSpine[i][1]*0.5]);

        paintGlow(bLE,-1,GLOW*0.4,GLOW_A*0.7);
        paintGlow(bRE, 1,GLOW*0.4,GLOW_A*0.7);
        fillVoid(bLE,bRE,VOID_DARK*0.9);
        strokeEdge(bLE,2,EDGE_A*0.8);
        strokeEdge(bRE,2,EDGE_A*0.8);
        strokeEdge(bLE,1,EDGE_A);
        strokeEdge(bRE,1,EDGE_A);
      }

      fillVoid(LE,RE,VOID_DARK*0.5);
      strokeEdge(LE,2,EDGE_A);
      strokeEdge(RE,2,EDGE_A);

      return canvas;
    }

    function addMarkers() {
      const scene = document.getElementById('scene');
      remnants.forEach(r => {
        if (r.lat == null || r.lng == null) return;
        const isOwn = r.uid === ownUID;
        const tex   = new THREE.CanvasTexture(makeMarker(isOwn));

        const entity = document.createElement('a-entity');
        entity.setAttribute('gps-projected-entity-place',
          `latitude: ${r.lat}; longitude: ${r.lng}`);

        // 自分の投稿は少し離れた位置（2m前方）に表示して見えやすくする
        const pos = isOwn ? '0 2 -2' : '0 2 0';

        const plane = document.createElement('a-plane');
        plane.setAttribute('width',    '1.0');
        plane.setAttribute('height',   '1.0');
        plane.setAttribute('position', pos);
        plane.setAttribute('look-at',  '[gps-projected-camera]');
        plane.setAttribute('class',    'clickable');
        plane.setAttribute('material',
          'transparent: true; opacity: 1; side: double; depthTest: false;');

        plane.addEventListener('click', () => showMsg(r));
        plane.addEventListener('loaded', () => {
          const mesh = plane.getObject3D('mesh');
          if (mesh) {
            mesh.material.map         = tex;
            mesh.material.transparent = true;
            mesh.material.needsUpdate = true;
          }
        });

        entity.appendChild(plane);
        scene.appendChild(entity);
      });
    }

    // A-Frameシーンのロード完了を待ってからマーカーを追加
    // これによりTHREEの利用可能性が保証される
    const scene = document.getElementById('scene');
    if (scene.hasLoaded) {
      addMarkers();
      document.getElementById('overlay').classList.add('hidden');
    } else {
      scene.addEventListener('loaded', () => {
        addMarkers();
        setTimeout(() => {
          document.getElementById('overlay').classList.add('hidden');
        }, 500);
      });
    }
  </script>
</body>
</html>
